name: guinea-pig
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build: ../backend
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ../backend:/app
      - ../data:/app/data
      - static_volume:/app/staticfiles
    # For EC2 production, use Gunicorn instead of runserver
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 guinea_pig.wsgi:application
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ../frontend
      args:
        - VITE_API_URL=/api
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    build: ../nginx
    ports:
      - "80:80"
      - "443:443" # For HTTPS
    volumes:
      - static_volume:/app/static:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro 
      - /etc/letsencrypt:/etc/letsencrypt:rw # For Certbot certificates
      - /var/www/certbot:/var/www/certbot:rw # For Certbot challenges
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
