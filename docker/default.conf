+# This file should be placed in docker/nginx/conf.d/default.conf
+
+# HTTP server block for Certbot challenges and HTTP to HTTPS redirection
+server {
+    listen 80;
+    server_name yourdomain.com www.yourdomain.com; # Replace with your actual domain
+
+    # Configuration for Certbot's HTTP-01 challenge
+    location /.well-known/acme-challenge/ {
+        root /var/www/certbot;
+    }
+
+    # Redirect all other HTTP traffic to HTTPS
+    location / {
+        return 301 https://$host$request_uri;
+    }
+}
+
+# HTTPS server block
+server {
+    listen 443 ssl;
+    server_name yourdomain.com www.yourdomain.com; # Replace with your actual domain
+
+    # SSL certificates obtained from Certbot
+    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem; # Replace with your actual domain
+    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem; # Replace with your actual domain
+
+    # Recommended SSL settings for security
+    ssl_session_cache shared:SSL:10m;
+    ssl_session_timeout 10m;
+    ssl_protocols TLSv1.2 TLSv1.3;
+    ssl_ciphers "ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20";
+    ssl_prefer_server_ciphers on;
+    ssl_stapling on;
+    ssl_stapling_verify on;
+    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
+    add_header X-Frame-Options DENY;
+    add_header X-Content-Type-Options nosniff;
+
+    # Proxy API requests to the Django backend service
+    location /api/ {
+        proxy_pass http://backend:8000;
+        proxy_set_header Host $host;
+        proxy_set_header X-Real-IP $remote_addr;
+        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
+        proxy_set_header X-Forwarded-Proto $scheme;
+    }
+
+    # Serve Django static files
+    location /static/ {
+        alias /app/static/; # Matches the static_volume mount in docker-compose.yml
+    }
+
+    # Serve the built frontend application (React/Vite)
+    location / {
+        root /usr/share/nginx/html; # Matches the ../frontend/dist mount in docker-compose.yml
+        index index.html index.htm;
+        try_files $uri $uri/ /index.html; # For client-side routing
+    }
+}